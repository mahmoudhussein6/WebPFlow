<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Resource Hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Preload Critical Fonts -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Sora:wght@400;700&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --bg-dark: #0a0a0c;
        --primary: #2dd4bf;
      }
      
      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-dark);
        color: white;
        font-family: 'Outfit', sans-serif;
        overflow: hidden;
      }

      /* Basic background pre-render to avoid flash */
      .critical-bg {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at 0% 0%, rgba(45, 212, 191, 0.03) 0%, transparent 50%),
                    radial-gradient(circle at 100% 100%, rgba(99, 102, 241, 0.03) 0%, transparent 50%);
        z-index: -1;
      }
    </style>
  </head>
  <body>
    <div class="critical-bg"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
