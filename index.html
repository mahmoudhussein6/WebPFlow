<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Resource Hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Preload Critical Fonts -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Sora:wght@400;700&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --bg-dark: #0a0a0c;
        --primary: #2dd4bf;
        --secondary: #6366f1;
      }
      
      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-dark);
        color: white;
        font-family: 'Outfit', sans-serif;
        overflow: hidden;
      }

      /* Splash Screen Styles */
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background-color: var(--bg-dark);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
      }

      .splash-logo {
        position: relative;
        width: 100px;
        height: 100px;
        margin-bottom: 2rem;
      }

      .logo-circle {
        position: absolute;
        inset: 0;
        border: 4px solid rgba(45, 212, 191, 0.1);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
      }

      .logo-inner {
        position: absolute;
        inset: 20px;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        border-radius: 12px;
        transform: rotate(45deg);
        box-shadow: 0 0 40px rgba(45, 212, 191, 0.3);
        animation: pulse 2s ease-in-out infinite;
      }

      .splash-text {
        font-family: 'Sora', sans-serif;
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        opacity: 0;
        transform: translateY(10px);
        animation: fadeIn 0.8s ease-out forwards 0.3s;
      }

      .splash-tagline {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.4em;
        color: rgba(255, 255, 255, 0.3);
        margin-top: 1rem;
        opacity: 0;
        animation: fadeIn 0.8s ease-out forwards 0.6s;
      }

      .loader-bar {
        width: 150px;
        height: 2px;
        background: rgba(255, 255, 255, 0.05);
        margin-top: 2rem;
        border-radius: 2px;
        overflow: hidden;
      }

      .loader-progress {
        width: 100%;
        height: 100%;
        background: var(--primary);
        transform: translateX(-100%);
        animation: progress 2s infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @keyframes pulse {
        0%, 100% { transform: rotate(45deg) scale(1); opacity: 1; }
        50% { transform: rotate(45deg) scale(1.1); opacity: 0.8; }
      }

      @keyframes fadeIn {
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes progress {
        0% { transform: translateX(-100%); }
        50% { transform: translateX(0); }
        100% { transform: translateX(100%); }
      }

      /* Background Mesh */
      .critical-bg {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at 0% 0%, rgba(45, 212, 191, 0.03) 0%, transparent 50%),
                    radial-gradient(circle at 100% 100%, rgba(99, 102, 241, 0.03) 0%, transparent 50%);
        z-index: -1;
      }

      /* Fade out class */
      .splash-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <div className="splash-logo">
        <div className="logo-circle"></div>
        <div className="logo-inner"></div>
      </div>
      <div className="splash-text">WebP<span style="color: var(--primary)">Flow</span></div>
      <div className="splash-tagline">Studio Engine Warming Up</div>
      <div className="loader-bar">
        <div className="loader-progress"></div>
      </div>
    </div>

    <div class="critical-bg"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Automatically hide splash screen after a minimum time or when app is ready
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.getElementById('splash-screen').classList.add('splash-hidden');
          document.body.style.overflow = 'auto';
        }, 1500);
      });
    </script>
  </body>
</html>
